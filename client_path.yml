journeys:
  - default: true
    entry_actions:
      - action: take-ticket
        label: Взять талон
        root_question_id: standard_q0
      - action: take-ticket-prereg
        label: Взять талон по предварительной записи
        root_question_id: prereg_q0
      - action: take-ticket-segment
        label: Взять талон по клиентскому сегменту
        root_question_id: segment_q0
    root_question_id: standard_q0
    questions:
      standard_q0:
        text: "Выберите формат обращения"
        options:
          - text: "Личное обращение"
            next_question_id: standard_q1
          - text: "Обращение по доверенности"
            next_question_id: standard_q1

      standard_q1:
        text: "Какой тип задачи хотите решить?"
        options:
          - text: "Консультация"
            next_question_id: standard_consult_q2
          - text: "Оформление документов"
            next_question_id: standard_docs_q2
          - text: "Сделки и сопровождение"
            next_question_id: standard_deals_q2

      standard_consult_q2:
        text: "Какая консультация нужна?"
        options:
          - text: "Юридическая консультация"
            next_question_id: standard_consult_q3_legal
          - text: "Финансовая консультация"
            next_question_id: standard_consult_q3_fin

      standard_consult_q3_legal:
        text: "Уточните тему юридической консультации"
        include_other_services_option: true
        options:
          - text: "Договоры и сделки"
            service_names: ["Юридическая консультация"]
          - text: "Претензии и споры"
            service_names: ["Юридическая консультация"]

      standard_consult_q3_fin:
        text: "Уточните тему финансовой консультации"
        include_other_services_option: true
        options:
          - text: "Личные финансы"
            service_names: ["Финансовая консультация"]
          - text: "Инвестиции"
            service_names: ["Финансовая консультация", "Премиальное обслуживание"]
            multi_services_action: choose_many

      standard_docs_q2:
        text: "Какой документ хотите оформить?"
        options:
          - text: "Стандартный пакет"
            next_question_id: standard_docs_q3_simple
          - text: "Индивидуальный пакет"
            next_question_id: standard_docs_q3_custom

      standard_docs_q3_simple:
        text: "Тип стандартного пакета"
        include_other_services_option: true
        options:
          - text: "Справки и выписки"
            service_names: ["Оформление документов"]
          - text: "Заявления"
            service_names: ["Оформление документов"]

      standard_docs_q3_custom:
        text: "Нужна ли проверка юристом?"
        options:
          - text: "Да, нужна проверка"
            service_names: ["Оформление документов", "Юридическая консультация"]
            multi_services_action: choose_many
          - text: "Нет, только подготовка"
            service_names: ["Оформление документов"]

      standard_deals_q2:
        text: "Какая сделка вас интересует?"
        options:
          - text: "Сделка с недвижимостью"
            next_question_id: standard_deals_q3_realty
          - text: "Сделка с долями/бизнесом"
            next_question_id: standard_deals_q3_shares

      standard_deals_q3_realty:
        text: "Нужны ли сопутствующие документы?"
        options:
          - text: "Да, оформить сопутствующие документы"
            service_names: ["Сделки", "Оформление документов"]
            multi_services_action: auto
          - text: "Нет, только сопровождение сделки"
            service_names: ["Сделки"]

      standard_deals_q3_shares:
        text: "Нужна ли консультация по рискам?"
        options:
          - text: "Да"
            service_names: ["Сделки", "Юридическая консультация"]
            multi_services_action: choose_many
          - text: "Нет"
            service_names: ["Сделки"]

      prereg_q0:
        text: "Введите номер предзаписи"
        input_type: text
        input_key: prereg_number
        script: |
          def n = (answer ?: '').trim()
          if (!n || n.size() < 4) throw new IllegalArgumentException('Номер предзаписи слишком короткий')
          return [nextQuestionId:'prereg_q1', visitParameters:[prereg_number:n]]

      prereg_q1:
        text: "Введите ПИН из SMS"
        input_type: text
        input_key: prereg_pin
        script: |
          def p = (answer ?: '').trim()
          if (!(p ==~ /\d{4}/)) throw new IllegalArgumentException('ПИН должен состоять из 4 цифр')
          return [serviceNames:['Предварительная запись'], visitParameters:[prereg_pin_verified:'true']]

      segment_q0:
        text: "Введите номер телефона"
        input_type: text
        input_key: phone
        script: |
          def phone = (answer ?: '').replaceAll(/\D/, '')
          if (phone.size() < 10) throw new IllegalArgumentException('Введите корректный номер телефона')
          def premium = phone.endsWith('00')
          if (premium) {
            return [serviceNames:['Премиальное обслуживание','Юридическая консультация'], multiServicesAction:'choose_many', visitParameters:[customer_segment:'premium']]
          }
          return [serviceNames:['Юридическая консультация'], visitParameters:[customer_segment:'mass']]
